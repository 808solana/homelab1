worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Allow cross-origin use (e.g. <img> / CSS background on other korgems subdomains).
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

        # Browsers should always revalidate so replaced files show up live.
        add_header Cache-Control "no-cache, must-revalidate" always;

        # Only serve known image files; deny directory listings and everything else.
        location ~* \.(png|jpe?g|webp|gif|svg|ico)$ {
            try_files $uri =404;
        }

        location = /healthz { add_header Content-Type text/plain; return 200 "ok\n"; }

        location / { return 404; }
    }
}
